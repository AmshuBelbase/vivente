name: Sync release branch to client production repo

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  sync-to-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout developer release branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start SSH agent and add deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SYNC_SSH_KEY }}

      - name: Add github.com to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add production remote and push release to prod main
        run: |
          git remote add production "${{ vars.PROD_REPO }}"
          git push --force production release:${{ vars.PROD_BRANCH }}